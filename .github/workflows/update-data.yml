name: Update Points League Data

on:
  schedule:
    - cron: "0 7 * * *"

  workflow_dispatch:

env:
  SEASON: "2026"

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository content
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Execute Python script
        env:
          WEBSHARE_PROXY: ${{ secrets.WEBSHARE_PROXY }}
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 60
          command: uv run points_league.py

      - name: Push data to data branch
        run: |
          git config --local user.name "joe-seibert"
          git config --local user.email "joe-seibert@users.noreply.github.com"
          cp seasons/$SEASON/data/pointsleague_$SEASON.json /tmp/
          cp seasons/$SEASON/data/full_points_table_$SEASON.json /tmp/
          cp seasons/$SEASON/data/undrafted_$SEASON.json /tmp/
          git fetch origin data:refs/remotes/origin/data || true
          git checkout -B data origin/data 2>/dev/null || git checkout --orphan data
          git rm -rf . --quiet
          cp /tmp/pointsleague_$SEASON.json .
          cp /tmp/full_points_table_$SEASON.json .
          cp /tmp/undrafted_$SEASON.json .
          git add pointsleague_$SEASON.json full_points_table_$SEASON.json undrafted_$SEASON.json
          git diff --cached --quiet || git commit -m "Update data $(date)"
          git push -f origin data
