<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The 2026 Jayson Tatum 50 Spicy Memorial Playoff Points Pool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    nav {
      text-align: center;
      margin-bottom: 2rem;
    }

    nav a {
      color: #a0aec0;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }

    nav a:hover { color: #e2e8f0; background: #1a1d27; }
    nav a.active { color: #f8b847; }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: clamp(1.2rem, 4vw, 1.9rem);
      font-weight: 700;
      color: #f8b847;
      line-height: 1.3;
    }

    header p.subtitle {
      margin-top: 0.5rem;
      color: #718096;
      font-size: 0.85rem;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    thead th {
      background: #1a1d27;
      color: #a0aec0;
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.7rem 1rem;
      text-align: left;
    }

    thead th.num { text-align: right; }

    tbody tr {
      border-bottom: 1px solid #1e2130;
      cursor: pointer;
      transition: background 0.15s;
    }

    tbody tr:hover { background: #1a1d27; }
    tbody tr.expanded { background: #1a1d27; }

    td { padding: 0.85rem 1rem; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }

    .rank { color: #718096; font-size: 0.8rem; width: 2rem; }
    .rank-1 { color: #f8b847; font-weight: 700; }
    .rank-2 { color: #a0aec0; font-weight: 600; }
    .rank-3 { color: #c07d4a; font-weight: 600; }

    .team-name { font-weight: 600; }
    .points { font-weight: 700; font-size: 1.05rem; }

    .chevron {
      float: right;
      transition: transform 0.2s;
      color: #4a5568;
    }
    tr.expanded .chevron { transform: rotate(90deg); }

    .player-row { display: none; background: #13161f; }
    .player-row.visible { display: table-row; }
    .player-row td {
      padding: 0.5rem 1rem 0.5rem 3rem;
      font-size: 0.875rem;
      color: #a0aec0;
      border-bottom: 1px solid #1a1d27;
    }
    .player-row td.num { color: #cbd5e0; }
    .player-name { color: #cbd5e0; }

    .error { text-align: center; color: #fc8181; padding: 2rem; }
    .loading { text-align: center; color: #718096; padding: 2rem; }

    .last-updated {
      text-align: center;
      color: #4a5568;
      font-size: 0.78rem;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="index.html" class="active">Standings</a>
      <a href="stats.html">Stats</a>
    </nav>

    <header>
      <h1>The 2026 Jayson Tatum 50 Spicy Memorial Playoff Points Pool</h1>
      <p class="subtitle">Click a coach to see player breakdown</p>
    </header>

    <div id="app"><p class="loading">Loading standings…</p></div>
    <p class="last-updated" id="last-updated"></p>
  </div>

  <script>
    const BASE = window.location.hostname === 'localhost'
      ? ''
      : 'https://raw.githubusercontent.com/joe-seibert/nbapointsleague/data';

    async function loadData() {
      const [standingsRes, playersRes] = await Promise.all([
        fetch(`${BASE}/pointsleague_2026.json`),
        fetch(`${BASE}/full_points_table_2026.json`),
      ]);
      if (!standingsRes.ok || !playersRes.ok) throw new Error('Failed to fetch data');
      return {
        standings: await standingsRes.json(),
        players: await playersRes.json(),
      };
    }

    function groupPlayersByTeam(players) {
      return players.reduce((acc, p) => {
        (acc[p.Team] = acc[p.Team] || []).push(p);
        return acc;
      }, {});
    }

    function render(standings, playersByTeam) {
      const sorted = [...standings].sort((a, b) => b.Points - a.Points);

      const rows = sorted.map((team, i) => {
        const rank = i + 1;
        const rankClass = rank <= 3 ? `rank-${rank}` : '';
        const teamPlayers = (playersByTeam[team.Team] || [])
          .slice()
          .sort((a, b) => b['Total Points'] - a['Total Points']);

        const playerRows = teamPlayers.map(p => `
          <tr class="player-row" data-team="${team.Team}">
            <td></td>
            <td class="player-name">${p.Player}</td>
            <td class="num">${p['Total Points']}</td>
          </tr>`).join('');

        return `
          <tr class="team-row" data-team="${team.Team}">
            <td class="rank num ${rankClass}">${rank}</td>
            <td class="team-name">${team.Team} <span class="chevron">›</span></td>
            <td class="num points">${team.Points}</td>
          </tr>
          ${playerRows}`;
      }).join('');

      document.getElementById('app').innerHTML = `
        <table>
          <thead>
            <tr>
              <th class="num">#</th>
              <th>Coach</th>
              <th class="num">PTS</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;

      document.querySelectorAll('.team-row').forEach(row => {
        row.addEventListener('click', () => {
          const team = row.dataset.team;
          const isExpanded = row.classList.contains('expanded');
          row.classList.toggle('expanded', !isExpanded);
          document.querySelectorAll(`.player-row[data-team="${team}"]`).forEach(pr => {
            pr.classList.toggle('visible', !isExpanded);
          });
        });
      });
    }

    loadData()
      .then(({ standings, players }) => {
        render(standings, groupPlayersByTeam(players));
        document.getElementById('last-updated').textContent =
          `Last updated: ${new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`;
      })
      .catch(err => {
        document.getElementById('app').innerHTML =
          `<p class="error">Could not load standings. (${err.message})</p>`;
      });
  </script>
</body>
</html>
